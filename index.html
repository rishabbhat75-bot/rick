<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Workspace | Meraj Rabbani</title>
    <meta name="description" content="Viewing hosted media for Class 11 computer science project.">
    <style>
        body { margin: 0; background: #0b0e14; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #interface { text-align: center; z-index: 10; width: 90%; max-width: 400px; }
        /* The giant button for the user gesture */
        .giant-btn { background: #ff0000; color: white; border: none; padding: 25px 50px; font-size: 1.5rem; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4); transition: transform 0.1s; }
        .giant-btn:active { transform: scale(0.96); }
        video { display: none; position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; object-fit: cover; }
        .status { margin-bottom: 20px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <div id="interface">
        <div class="status">Source: rick.mp4 • Status: Ready</div>
        <button class="giant-btn" onclick="blast()">CONTINUE TO CONTENT</button>
    </div>

    <video id="player" playsinline>
        <source src="rick.mp4" type="video/mp4">
    </video>

    <script>
        function blast() {
            const vid = document.getElementById("player");
            const ui = document.getElementById("interface");
            
            // Hide the UI
            ui.style.display = "none";
            
            // Reveal and Play video with sound
            vid.style.display = "block";
            vid.muted = false; // Unmutes the video
            vid.play().catch(e => {
                console.error("Playback failed:", e);
                // Fallback if browser still blocks it
                vid.muted = true;
                vid.play();
            });
        }
    </script>
</body>
</html>
